server:
  port: 8084

spring:
  application:
    name: drl-engine-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: drl-engine-consumer
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    topics:
      traffic-features: traffic-features
      traffic-alerts: traffic-alerts

# DRL Engine hyperparameters
drl:
  state-size: 8
  action-size: 4
  hidden-layers: [64, 32]
  learning-rate: 0.001
  gamma: 0.95
  epsilon-init: 1.0
  epsilon-min: 0.01
  epsilon-decay: 0.995
  replay-buffer-capacity: 10000
  batch-size: 32
  target-update-freq: 100
  train-freq: 4
  green-time-step: 5
  model:
    dir: ./drl-models
